<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS란? 선택자 + 붙이는 법</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <h1>CSS 첫걸음</h1>
    <p>모든 p는 초록</p>
    <p class="special">이 줄만 주황</p>
    <ul>
      <li>사과</li>
      <li><em>바나나</em>는 보라</li>
      <p>바나나는 상했나봐..</p>
      <li><p class="special">멜론</p></li>

      <p>과일은 맛있지만 당류를 주의해</p>
    </ul>
  </body>
</html>
