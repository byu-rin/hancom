<!-- HTML을 건드리지 않고 콘텐츠 앞(::before)과 뒤(::after)에 장식을 끼워 넣는 가상 요소

실제 DOM에는 없는 가짜 요소 — content 속성이 반드시 있어야 화면에 나타남 -->

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/main.css" />
    <title>가상 요소 ::before ::after</title>
  </head>
  <body>
    <!-- 제목 앞에 ::before 로 별(★)이 붙음 -->
    <h1 class="star-title">즐겨찾기 메뉴</h1>
    <!-- ::before·::after 로 양옆에 따옴표가 생김 -->
    <p class="quote">가짜 요소는 HTML에 없다</p>
    <!-- ::after 로 글자 아래 파란 줄이 그려짐 -->
    <p class="underline-deco">밑줄 장식이 붙은 문장</p>
  </body>
</html>
