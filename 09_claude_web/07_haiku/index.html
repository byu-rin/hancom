<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calc-wrapper">
    <div class="calc">
      <div class="display">
        <div class="display-expression" id="expression"></div>
        <div class="display-value" id="display">0</div>
      </div>
      <div class="keypad">
        <button class="btn btn-ghost" data-action="clear-all">AC</button>
        <button class="btn btn-ghost" data-action="toggle-sign">+/-</button>
        <button class="btn btn-ghost" data-action="percent">%</button>
        <button class="btn btn-operator" data-action="operator" data-value="/">÷</button>

        <button class="btn btn-neutral" data-action="digit" data-value="7">7</button>
        <button class="btn btn-neutral" data-action="digit" data-value="8">8</button>
        <button class="btn btn-neutral" data-action="digit" data-value="9">9</button>
        <button class="btn btn-operator" data-action="operator" data-value="*">×</button>

        <button class="btn btn-neutral" data-action="digit" data-value="4">4</button>
        <button class="btn btn-neutral" data-action="digit" data-value="5">5</button>
        <button class="btn btn-neutral" data-action="digit" data-value="6">6</button>
        <button class="btn btn-operator" data-action="operator" data-value="-">−</button>

        <button class="btn btn-neutral" data-action="digit" data-value="1">1</button>
        <button class="btn btn-neutral" data-action="digit" data-value="2">2</button>
        <button class="btn btn-neutral" data-action="digit" data-value="3">3</button>
        <button class="btn btn-operator" data-action="operator" data-value="+">+</button>

        <button class="btn btn-neutral btn-wide" data-action="digit" data-value="0">0</button>
        <button class="btn btn-neutral" data-action="decimal">.</button>
        <button class="btn btn-brand" data-action="equals">=</button>
      </div>
    </div>
  </div>

  <div id="ball-container"></div>

  <script src="script.js"></script>
</body>
</html>
