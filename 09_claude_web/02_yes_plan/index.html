<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>👑 공주님의 계산기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="calc-app">
      <header>
        <h1>👑 공주님의 계산기 <span class="sparkle">✨</span></h1>
      </header>

      <!-- 디스플레이: 위쪽은 진행 중 수식(작게), 아래쪽은 현재 값 -->
      <section class="display" aria-label="계산 표시창">
        <div id="expression" aria-hidden="true"></div>
        <output id="display" aria-live="polite">0</output>
      </section>

      <!-- 버튼 그리드: 이벤트 위임으로 처리 -->
      <div id="keys">
        <button type="button" class="key key--func" data-action="clear" data-value="AC">AC</button>
        <button type="button" class="key key--func" data-action="backspace" data-value="⌫">⌫</button>
        <button type="button" class="key key--func" data-action="percent" data-value="%">%</button>
        <button type="button" class="key key--op" data-action="operator" data-value="/">÷</button>

        <button type="button" class="key key--num" data-action="number" data-value="7">7</button>
        <button type="button" class="key key--num" data-action="number" data-value="8">8</button>
        <button type="button" class="key key--num" data-action="number" data-value="9">9</button>
        <button type="button" class="key key--op" data-action="operator" data-value="*">×</button>

        <button type="button" class="key key--num" data-action="number" data-value="4">4</button>
        <button type="button" class="key key--num" data-action="number" data-value="5">5</button>
        <button type="button" class="key key--num" data-action="number" data-value="6">6</button>
        <button type="button" class="key key--op" data-action="operator" data-value="-">−</button>

        <button type="button" class="key key--num" data-action="number" data-value="1">1</button>
        <button type="button" class="key key--num" data-action="number" data-value="2">2</button>
        <button type="button" class="key key--num" data-action="number" data-value="3">3</button>
        <button type="button" class="key key--op" data-action="operator" data-value="+">+</button>

        <button type="button" class="key key--func" data-action="negate" data-value="±">±</button>
        <button type="button" class="key key--num" data-action="number" data-value="0">0</button>
        <button type="button" class="key key--num" data-action="decimal" data-value=".">.</button>
        <button type="button" class="key key--equals" data-action="equals" data-value="=">=</button>
      </div>

      <!-- 계산 기록 -->
      <section id="history-box">
        <div class="history-head">
          <h2>💖 계산 기록</h2>
          <button type="button" id="clear-history">비우기</button>
        </div>
        <ul id="history" aria-live="polite"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
