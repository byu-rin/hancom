<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>입력 폼</title>
  </head>
  <body>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/a3ICNMQW7Ok?si=0F5S_icyWyB5AAlv"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <iframe
      width="320"
      height="220"
      src="https://www.google.com/maps?q=성남시청&amp;output=embed"
    ></iframe>
    <br />
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m5!3m3!1m2!1s0x357b58343b54f1e1%3A0x4be56b0b1ad940df!2z7KCV7J6Q!5e0!3m2!1sko!2skr!4v1782779354784!5m2!1sko!2skr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <form>
      <label>이름: <input type="text" placeholder="이름 입력" /></label>
      <label>나이: <input type="number" /></label>
      <br />
      <label>색상: <input type="color" id="myColor" value="ff0000" /></label>
      <br />
      <button type="submit">보내기</button>
    </form>
  </body>
</html>
